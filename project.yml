name: DigitalTower
options:
  bundleIdPrefix: com.digitaltower
  deploymentTarget:
    visionOS: "2.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  DigitalTower:
    type: application
    platform: visionOS
    deploymentTarget: "2.0"
    sources:
      - path: DigitalTower
      - path: DigitalTower/Resources/Models/A380ExteriorLite.usdz
        buildPhase: resources
      - path: DigitalTower/Resources/Models/airbus_a380full_interior_hd.glb
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitaltower.vision
        PRODUCT_NAME: DigitalTower
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Digital Tower
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: YES
        INFOPLIST_KEY_AVIATION_API_BASE_URL: $(AVIATION_API_BASE_URL)
        INFOPLIST_KEY_AVIATION_API_TOKEN: $(AVIATION_API_TOKEN)
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 2
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
  DigitalTowerTests:
    type: bundle.unit-test
    platform: visionOS
    deploymentTarget: "2.0"
    sources:
      - path: DigitalTowerTests
    dependencies:
      - target: DigitalTower
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitaltower.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
